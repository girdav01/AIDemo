<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Staff · Award a clear</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .wrap2 { max-width: 560px; margin: 0 auto; padding: 18px; }
    .big { font-size: 18px; padding: 12px; }
    label { display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
    .res { margin-top:14px; }
  </style>
</head>
<body>
  <div class="wrap2">
    <div class="card">
      <h2>🛠 Staff · Award a clear</h2>
      <p class="muted" style="font-size:13px">For a station tablet. Scan the attendee's
        e-passport QR (a USB/camera scanner types the URL into the box) or enter their
        player id / corporate email, pick the station, and mark it cleared.</p>
      <label>Attendee (QR URL, player id, or corporate email)</label>
      <input id="target" class="big" placeholder="paste QR URL, player id, or email:name@corp.com" autofocus />
      <label>Station</label>
      <select id="challenge" class="big"></select>
      <div class="row" style="margin-top:14px">
        <button id="awardBtn" class="big">✔ Mark cleared</button>
        <button id="clearBtn" class="ghost big">Clear</button>
      </div>
      <div class="res" id="res"></div>
    </div>
    <div class="card" style="margin-top:16px">
      <h2>Recent awards</h2>
      <div id="recent" class="muted" style="font-size:13px">None yet this session.</div>
    </div>
  </div>
  <script>
    const esc = (s) => String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
    const recent = [];
    async function load() {
      const chs = (await (await fetch("/api/challenges")).json()).challenges;
      document.getElementById("challenge").innerHTML =
        chs.map(c => `<option value="${c.id}">${c.number}. ${esc(c.name)} (${esc(c.layer)})</option>`).join("");
    }
    async function award() {
      const target = document.getElementById("target").value.trim();
      const challenge_id = document.getElementById("challenge").value;
      if (!target) return;
      const res = document.getElementById("res");
      try {
        const r = await fetch("/api/staff/award", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ target, challenge_id }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || "Failed");
        res.innerHTML = `<div class="banner good">✔ ${esc(d.player.name)} cleared
          <b>${esc(challenge_id)}</b> — now ${d.player.points} pts,
          ${d.player.stamps}/8 stamps${d.player.completed ? " · ✅ full passport" : ""}.</div>`;
        recent.unshift(`${d.player.name} → ${challenge_id} (${d.player.points} pts)`);
        document.getElementById("recent").innerHTML = recent.slice(0,10).map(esc).join("<br>");
        document.getElementById("target").value = "";
        document.getElementById("target").focus();
      } catch (e) {
        res.innerHTML = `<div class="banner bad">${esc(e.message)}</div>`;
      }
    }
    document.getElementById("awardBtn").onclick = award;
    document.getElementById("clearBtn").onclick = () => {
      document.getElementById("target").value = "";
      document.getElementById("res").innerHTML = "";
      document.getElementById("target").focus();
    };
    // Barcode/QR scanners usually send Enter after the value.
    document.getElementById("target").addEventListener("keydown", (e) => {
      if (e.key === "Enter") award();
    });
    load();
  </script>
</body>
</html>
